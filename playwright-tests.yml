name: Playwright Tests

on:
  push:
    branches: [ main ]

concurrency:

  group: playwright-tests-${{ github.event.pull_request.number }}

  cancel-in-progress: true

permissions:

  contents: read

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:

      CI: true

    steps:

      # Check out code

      - name: Checkout code

        uses: actions/checkout@v4

      # Set up Node.js with yarn cache

      - name: Set up Node.js

        uses: actions/setup-node@v4

        with:

          node-version: lts/*

          cache: yarn
          cache-dependency-path: yarn.lock

      # Install dependencies with immutable lock file

      - name: Install dependencies

        run: yarn install --frozen-lockfile

      # Install Playwright browsers and system dependencies

      - name: Install Playwright browsers

        run: yarn playwright install --with-deps

      # Run Playwright tests in parallel

      - name: Run Playwright tests

        run: yarn playwright test

      # Upload HTML report (always)

      - name: Upload Playwright HTML report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: playwright-html-report

          path: playwright-report/

          retention-days: 7

      # Upload trace files (always)

      - name: Upload Playwright traces

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: playwright-traces

          path: test-results/**/trace*.zip

          retention-days: 7
 