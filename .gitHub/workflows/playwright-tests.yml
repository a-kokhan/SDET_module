name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment: github-pages
    env:
      CI: true
    defaults:
      run:
        working-directory: AI-Assisted Continuous Integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: AI-Assisted Continuous Integration/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: AI-Assisted Continuous Integration/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            AI-Assisted Continuous Integration/test-results/**/trace*.zip
            AI-Assisted Continuous Integration/test-results
          if-no-files-found: ignore

      - name: Notify Microsoft Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH_NAME: ${{ github.head_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "❌ Playwright workflow failed.\nPR: ${PR_TITLE}\nAuthor: ${PR_AUTHOR}\nBranch: ${BRANCH_NAME}\nRun: ${RUN_URL}"
          }
          JSON
          )
          payload="${payload//\$\{PR_TITLE\}/${PR_TITLE}}"
          payload="${payload//\$\{PR_AUTHOR\}/${PR_AUTHOR}}"
          payload="${payload//\$\{BRANCH_NAME\}/${BRANCH_NAME}}"
          payload="${payload//\$\{RUN_URL\}/${RUN_URL}}"
          curl -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL"

      - name: Prepare Playwright history
        if: always() && github.ref == 'refs/heads/main'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_REF: ${{ github.ref_name }}
          JOB_CONCLUSION: ${{ job.status }}
        run: |
          mkdir -p playwright-report
          git fetch --depth=1 origin gh-pages || true
          if git show origin/gh-pages:history.json > history-prev.json 2>/dev/null; then
            echo "Found previous history.json"
          else
            echo "[]" > history-prev.json
          fi
          node -e "const fs=require('fs');const path='playwright-report/history.json';const prevPath='history-prev.json';const runUrl=process.env.RUN_URL;const commit=process.env.COMMIT_SHA;const branch=process.env.BRANCH_REF;const conclusion=process.env.JOB_CONCLUSION;const timestamp=process.env.RUN_TIMESTAMP||new Date().toISOString();let previous=[];try{previous=JSON.parse(fs.readFileSync(prevPath,'utf8'));if(!Array.isArray(previous))previous=[];}catch{previous=[];}let counts={};try{const reportPath='playwright-report/data/test-results.json';if(fs.existsSync(reportPath)){const report=JSON.parse(fs.readFileSync(reportPath,'utf8'));if(report&&report.stats){counts={expected:report.stats.expected,unexpected:report.stats.unexpected,skipped:report.stats.skipped,flaky:report.stats.flaky,duration:report.stats.duration};}}}catch{}const entry={timestamp,runUrl,commitSha:commit,ref:branch,jobConclusion:conclusion,counts};previous.push(entry);fs.writeFileSync(path,JSON.stringify(previous,null,2));"
          mkdir -p ../playwright-report
          cp -R playwright-report/. ../playwright-report/

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: AI-Assisted Continuous Integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: AI-Assisted Continuous Integration/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        continue-on-error: false
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          AUDIT_EXIT=$?
          AUDIT_EXIT=$AUDIT_EXIT node -e "const fs=require('fs');let high='n/a',critical='n/a',total='n/a';try{const r=JSON.parse(fs.readFileSync('npm-audit.json','utf8'));const v=(r.metadata&&r.metadata.vulnerabilities)||{};high=v.high??0;critical=v.critical??0;total=v.total??0;}catch(e){}const summary=['## Security Scan (npm audit)','- High: '+high,'- Critical: '+critical,'- Total: '+total,'- Exit code: '+process.env.AUDIT_EXIT,''];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,summary.join('\\n'));"
          exit $AUDIT_EXIT